name: fitzone
description: "FitZone Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  freezed_annotation: ^3.1.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  google_maps_flutter: ^2.15.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.11.0
  logging: ^1.3.0
  path: ^1.9.1
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.4
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:

  # Code Generation
  build_runner: ^2.12.2
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  generate: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/
