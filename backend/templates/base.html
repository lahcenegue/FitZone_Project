{% load i18n static %}
{% get_current_language as LANGUAGE_CODE %}
{% get_current_language_bidi as LANGUAGE_BIDI %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_BIDI %}rtl{% else %}ltr{% endif %}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google" content="notranslate" />
  <meta name="description" content="{% block meta_description %}FitZone{% endblock %}" />
  <title>{% block title %}FitZone{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="{% static 'global/css/tokens.css' %}" />

  {% block extra_css %}{% endblock %}
</head>

<body>

  {% block body %}{% endblock %}

  <div id="lightboxModal" class="lightbox-modal" onclick="closeLightbox()">
      <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
      <img class="lightbox-content" id="lightboxImg" alt="Enlarged View">
  </div>

  <script src="{% static 'global/js/global.js' %}"></script>

  {% block extra_js %}{% endblock %}

</body>
</html>
